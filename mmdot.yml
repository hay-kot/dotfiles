macros:
  personal: '"personal" in tags'
  grafana: '"grafana" in tags'

variables:
  var_files:
    - ./mmdot/vault.yml?vault=true
    - ./mmdot/repos.yml

templates:
  - name: Host File Template
    tags: [personal]
    template: |-
      {{- range $key, $value := .homelab_ssh_config }}
      Host {{ $key }}
      {{- range $k2, $v2 := $value }}
          {{ $k2 }} {{ $v2 }}
      {{- end }}
      {{ end -}}
    output: ~/.mmdot/homelab_ssh_config
    perm: "0600"
  - name: Secrets File
    tags: [personal]
    template: |-
      {{ range $key, $value := .personal_env_secrets }}
      {{ $key }}={{ $value }}
      {{ end }}
    output: secrets/.env.local
    perm: "0600"
  - name: Clone Personal Repos
    tags: [personal, repos]
    template: |-
      #!/bin/bash
      set -e
      REPO_DIR="$HOME/code/Repos"
      mkdir -p "$REPO_DIR"
      {{ range .personal_repos -}}
      REPO_NAME=$(basename "{{ . }}" .git)
      if [ ! -d "$REPO_DIR/$REPO_NAME" ]; then
        echo "Cloning $REPO_NAME..."
        git clone "{{ . }}" "$REPO_DIR/$REPO_NAME"
      else
        echo "Skipping $REPO_NAME (already exists)"
      fi
      {{ end -}}
    output: ./setup/clones.personal.sh
    perm: "0755"
  - name: Clone Grafana Repos
    tags: [grafana, repos]
    template: |-
      #!/bin/bash
      set -e
      REPO_DIR="$HOME/code/Repos"
      mkdir -p "$REPO_DIR"
      {{ range .grafana_repos -}}
      REPO_NAME=$(basename "{{ . }}" .git)
      if [ ! -d "$REPO_DIR/$REPO_NAME" ]; then
        echo "Cloning $REPO_NAME..."
        git clone "{{ . }}" "$REPO_DIR/$REPO_NAME"
      else
        echo "Skipping $REPO_NAME (already exists)"
      fi
      {{ end -}}
    output: ./setup/clones.grafana.sh
    perm: "0755"

exec:
  shell: /bin/bash
  scripts:
    # brew (run first, other scripts depend on installed packages)
    - { path: "./setup/brew.grafana.sh", tags: ["grafana", "brew"] }
    - { path: "./setup/brew.personal.sh", tags: ["personal", "brew"] }

    # repos
    - { path: "./setup/clones.personal.sh", tags: ["personal", "repos"] }
    - { path: "./setup/clones.grafana.sh", tags: ["grafana", "repos"] }

    # dev
    - { path: "./setup/dirs.sh", tags: ["grafana", "personal", "dirs"] }
    - { path: "./setup/git.sh", tags: ["grafana", "personal", "git"] }
    - { path: "./setup/git.personal.sh", tags: ["personal", "git"] }
    - { path: "./setup/tmux.sh", tags: ["grafana", "personal", "tmux"] }

    # mac
    - { path: "./setup/mac.dock.sh", tags: ["grafana", "personal", "mac", "setup"] }
    - { path: "./setup/mac.preferences.sh", tags: ["grafana", "personal", "mac", "setup"] }
    - { path: "./setup/mac.defaults.sh", tags: ["grafana", "personal", "mac", "setup"] }

    # env & config
    - { path: "./setup/env.grafana.sh", tags: ["grafana", "env"] }
    - { path: "./setup/env.personal.sh", tags: ["personal", "env"] }
    - { path: "./setup/ssh_config.sh", tags: ["personal", "ssh"] }
    - { path: "./setup/ai.sh", tags: ["personal", "ai"] }
    # SCAFFOLD:setup-script

