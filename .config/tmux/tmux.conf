# ─────────────────────────────────────────────────────────────
# General Settings
# ─────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g status-interval 1

# ─────────────────────────────────────────────────────────────
# Prefix Key
# ─────────────────────────────────────────────────────────────
set -g prefix C-Space
bind C-Space send-prefix

# ─────────────────────────────────────────────────────────────
# Pane Navigation (vim-style)
# ─────────────────────────────────────────────────────────────
# Alt+hjkl without prefix (like zellij)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ─────────────────────────────────────────────────────────────
# Pane Splitting (intuitive keys)
# ─────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# ─────────────────────────────────────────────────────────────
# Pane Resizing
# ─────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -n M-= resize-pane -Z  # Alt+= for zoom (like Alt++ fullscreen)

# ─────────────────────────────────────────────────────────────
# Window (Tab) Management
# ─────────────────────────────────────────────────────────────
bind -n M-t new-window -c "#{pane_current_path}"  # Alt+t new tab
bind -n M-Tab next-window                          # Alt+Tab next
bind -n M-n split-window -h -c "#{pane_current_path}"  # Alt+n new pane (like zellij)

# ─────────────────────────────────────────────────────────────
# Copy Mode (vim-style)
# ─────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ─────────────────────────────────────────────────────────────
# Custom: Lazygit Popup (Alt+g)
# ─────────────────────────────────────────────────────────────
bind -n M-g display-popup -E -w 80% -h 80% "lazygit"

# ─────────────────────────────────────────────────────────────
# Custom: Session Picker (prefix + f)
# ─────────────────────────────────────────────────────────────
bind f display-popup -E -w 60% -h 60% "tmux list-sessions -F '#S' | fzf --reverse | xargs -I{} tmux switch-client -t {}"

# ─────────────────────────────────────────────────────────────
# Custom: Hive Review Popup (prefix + r)
# ─────────────────────────────────────────────────────────────
bind r display-popup -E -w 75% -h 95% -d "#{pane_current_path}" "$SHELL -lic 'hive review --latest || (echo \"Press enter to close\"; read)'"

# ─────────────────────────────────────────────────────────────
# Session Navigation (prefix + number to switch to Nth session)
# ─────────────────────────────────────────────────────────────
bind 1 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '1p')"
bind 2 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '2p')"
bind 3 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '3p')"
bind 4 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '4p')"
bind 5 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '5p')"
bind 6 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '6p')"
bind 7 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '7p')"
bind 8 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '8p')"
bind 9 run-shell "tmux switch-client -t $(tmux list-sessions -F '#S' | sed -n '9p')"

# ─────────────────────────────────────────────────────────────
# Custom: Command Palette (prefix + k)
# ─────────────────────────────────────────────────────────────
bind k display-popup -E -w 60% -h 60% "~/.config/tmux/scripts/command-palette.sh"

# ─────────────────────────────────────────────────────────────
# Status Bar — Tokyo Night palette (inlined)
# ─────────────────────────────────────────────────────────────
# bg=#1A1B26  fg=#a9b1d6  bblack=#2A2F41  blue=#7aa2f7
# green=#73daca  bgreen=#41a6b5  yellow=#e0af68

set -g status-position top
set -g status-style "bg=#1A1B26,fg=#a9b1d6"
set -g status-left-length 80
set -g status-right-length 150
set -g status-right ""
set -g window-status-separator ""

set -g status-left "#[fg=#2A2F41,bg=#7aa2f7,bold] #{?client_prefix,󰠠 ,#[dim]󰤂 }#[bold,nodim]#S "
set -g window-status-current-format "#[fg=#73daca,bg=#2A2F41] #{?#{==:#{pane_current_command},ssh},󰣀 ,  }#[fg=#a9b1d6,bold]#I #W#[nobold] #P "
set -g window-status-format "#[fg=#a9b1d6,bg=#1A1B26] #{?#{==:#{pane_current_command},ssh},󰣀 ,  }#I #W#[dim] #P #[fg=#e0af68]#{?window_last_flag,󰁯  , }"

set -g mode-style "fg=#41a6b5,bg=#2A2F41"
set -g message-style "fg=#2A2F41,bg=#7aa2f7"
set -g message-command-style "fg=#7aa2f7,bg=#2A2F41"
set -g pane-border-style "fg=#2A2F41"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-status off
set -g popup-border-style "fg=#7aa2f7"

# ─────────────────────────────────────────────────────────────
# Plugins
# ─────────────────────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
run-shell "tmux set-environment -g PATH $HOME/.local/share/mise/shims:$PATH"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'

bind l switch-client -t hive
bind m display-popup -E -w 90% -h 85% "tmux new-session -A -s hivemind -c ~/Code/repos/hivemind 'claude'"
bind h display-popup -E -w 60% -h 55% "hive x pick"
bind t display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "hive hc"

# Initialize TPM (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'


