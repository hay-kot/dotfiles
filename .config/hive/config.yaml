version: 0.2.5
git_path: git
workspaces:
  - /Users/hayden/code/repos

tmux:
  enabled: [tmux]
  poll_interval: 500ms

agents:
  default: claude
  claude:
    command: claude
    flags: ["--dangerously-skip-permissions"]
  opencode:
    command: opencode
    flags: ["--agent", "free-permissions-runner"]

tui:
  refresh_interval: 10s
  preview_enabled: true
  views:
    store: true

review:
  comment_line_width: 100
  max_width: 100
  center_document: true

todos:
  actions:
    obsidian: "open {{ .URI | shq }}"

plugins:
  shell_workers: 10 # shared subprocess concurrency limit
  github:
    enabled: true
    results_cache: 30m
  claude:
    yellow_threshold: 60 # % to turn yellow
    red_threshold: 80 # % to turn red
    model_limit: 200000 # context window size

rules:
  - pattern: ""
    max_recycled: 3
    commands:
      - hive ctx init
      - bd init --force --stealth || true
  - pattern: ".*[:/]grafana/.*"
    commands:
      - mise trust
  - pattern: ".*[:/]grafana/deployment_tools"
    clone_strategy: worktree
  - pattern: ".*[:/]colonyops/.*"
    commands:
      - mise trust
  - pattern: ".*[:/]hay-kot/.*"
    commands:
      - mise trust
  - pattern: ".*[:/]hay-kot/recipinned"
    commands:
      - task dep:sync
      # - task pc:install
  - pattern: ".*[:/]hay-kot/mealie"
    commands:
      - task setup

keybindings:
  A:
    cmd: SendAccept
  ctrl+d:
    cmd: TmuxKill
  p:
    cmd: TmuxPopUp
  S:
    cmd: TmuxStart

usercommands:
  ReviewRequest:
    sh: "~/.config/hive/scripts/request-review.sh {{ .Name }}"
    help: "Request code review of current branch"
    silent: true

  CheckInbox:
    sh: '{{ agentSend }} "{{ .Name }}:{{ .TmuxWindow }}" "/hive-msg check you input for messages hive msg sub -t agent.{{ .ID }}.inbox --new"'
    help: "Instructs claude to check it's inbox"
    silent: true

  SendAccept:
    sh: '{{ agentSend }} "{{ .Name }}:{{ .TmuxWindow }}"'
    help: "Send enter to claude window"
    silent: true

  SendTidy:
    help: send /tidy
    sh: '{{ agentSend }} "{{ .Name }}:{{ .TmuxWindow }}" "/tidy"'
    silent: true

  SendClear:
    help: send /clear
    sh: '{{ agentSend }} "{{ .Name }}:{{ .TmuxWindow }}" "/clear"'
    silent: true

  SendRebase:
    help: send rebase command
    sh: '{{ agentSend }} "{{ .Name }}:{{ .TmuxWindow }}" "fetch and rebase the current branch on {{ if .Args }}{{ index .Args 0 }}{{ else }}main{{ end }} branch and resolve any conflicts"'
    silent: true

  OpenInZed:
    sh: "zed {{ .Path }}"
    help: open in zed
    silent: true

  PRLink:
    sh: "cd {{ .Path }} && prlink"
    help: get a pr link
    silent: false

  TmuxPopUp:
    help: popup
    sh: tmux display-popup -E -w 90% -h 90% "tmux kill-session -t hive-popup 2>/dev/null; tmux new-session -s hive-popup -t '{{ .Name }}' \; select-window -t :{{ .TmuxWindow }}"
    exit: false
    silent: true

  CopyAgentInbox:
    help: copy agent inbox to clipboard
    sh: cd {{ .Path }} && hive session info --json | jq .inbox -r | pbcopy
    silent: true

  ReviewCodeSync:
    help: "sequential chain review: codex (correctness) → agent (design+tests) → claude (comments+verdict)"
    silent: true
    windows:
      - name: review-codex
        command: |-
          codex 'You are the first reviewer in a sequential code review chain. Your focus is CORRECTNESS.
          Your workflow:
          1. Read the correctness review skill for guidance:
             cat .ai/skills/review-correctness/SKILL.md
          2. Read all changes under review:
             git diff main...HEAD   (branch commits)
             git diff               (unstaged changes)
          3. For Go projects, run dead code analysis:
             deadcode -test ./... 2>/dev/null || true
          4. Analyse for: logic bugs, error handling, edge cases, race conditions, resource
             leaks, security vulnerabilities, and dead code. Follow the skill output format.
          5. YOU MUST publish your findings before exiting. This is not optional — the next
             reviewer is blocked waiting for your message. Run this exact command:
             hive msg pub --topic review-{{ .ID }}.codex "your detailed findings"
             Do not summarize to stdout and stop. Do not skip this step. The workflow
             breaks entirely if you do not publish.
          Be thorough. The next reviewer will challenge your findings.'

      - name: review-agent
        command: |-
          agent 'You are the second reviewer in a sequential code review chain. Your focus is DESIGN AND TESTS.
          Your workflow:
          1. Wait for the first reviewer (codex) to finish:
             hive msg sub --topic review-{{ .ID }}.codex --wait --timeout 2h
          2. Read the design and test review skills for guidance:
             cat .ai/skills/review-design/SKILL.md
             cat .ai/skills/review-tests/SKILL.md
          3. Read all changes under review:
             git diff main...HEAD   (branch commits)
             git diff               (unstaged changes)
          4. Read codex'\''s findings from step 1.
          5. For Go projects, run test coverage analysis:
             go test ./... -coverprofile=coverage.out -covermode=atomic 2>/dev/null && go tool cover -func=coverage.out || true
          6. Analyse for: naming quality, unjustified abstractions, helper function bloat,
             API surface problems, test redundancy, and coverage gaps. Follow the skill output formats.
          7. For each of codex'\''s findings: agree, refute, or deepen it with evidence from the diff.
          8. YOU MUST publish your findings before exiting. This is not optional — the next
             reviewer is blocked waiting for your message. Run this exact command:
             hive msg pub --topic review-{{ .ID }}.agent "your analysis"
             Do not summarize to stdout and stop. Do not skip this step. The workflow
             breaks entirely if you do not publish.
          Be critical of both the code and codex'\''s findings. Do not simply restate what codex said.'

      - name: review-claude
        command: |-
          {{ agentCommand }} {{ agentFlags }} 'You are the final reviewer in a sequential
          code review chain. Your focus is COMMENTS AND FINAL SYNTHESIS.
          Your workflow:
          1. Wait for the second reviewer (agent) to finish:
             hive msg sub --topic review-{{ .ID }}.agent --wait --timeout 2h
          2. Read the comments review skill for guidance:
             cat .ai/skills/review-comments/SKILL.md
          3. Read codex'\''s findings:
             hive msg sub --topic review-{{ .ID }}.codex
          4. Read agent'\''s findings from step 1.
          5. Read all changes under review:
             git diff main...HEAD   (branch commits)
             git diff               (unstaged changes)
          6. Review all comments in the changed code for quality per the comments skill.
          7. Produce the final verdict. You must:
             - Report comment quality findings
             - Challenge every finding from both reviewers: demand evidence, reject vague claims
             - Identify issues NEITHER reviewer caught
             - Call out where the two reviewers contradict each other and resolve it
             - Rank all issues by severity (critical / major / minor)
             - Give a clear ship / do not ship recommendation with specific conditions
           Be adversarial. Assume the previous reviewers missed things.'

  ReviewOpenCode:
    help: "run OpenCode review in a dedicated tmux window"
    silent: false
    focus: false
    windows:
      - name: review-opencode
        command: |-
          opencode --agent free-permissions-runner --prompt "Review all current repository changes against {{ if .Args }}{{ index .Args 0 }}{{ else }}main{{ end }}. Inspect both git diff {{ if .Args }}{{ index .Args 0 }}{{ else }}main{{ end }}...HEAD and git diff. Report findings grouped by severity (critical, major, minor). Include concrete evidence with file paths and line references."

  ReviewRalph:
    help: "iterative self-critiquing review loop"
    form:
      - variable: iterations
        type: text
        label: "Number of iterations"
        placeholder: "3"
    windows:
      - name: review-ralph
        command: "cd {{ .Path }} && bash ~/.config/hive/scripts/review-ralph.sh {{ .Form.iterations | shq }}"
