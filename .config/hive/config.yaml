version: 0.2.7
git_path: git
workspaces:
  - ~/code/repos

context:
  base_dir: "/Users/hayden/code/repos/hivemind/context"

tui:
  store: true

tmux:
  poll_interval: 500ms
  preview_window_matcher: [claude, aider, codex, cursor, crush, agent, ^pi$, llm, opencode, orchestrator]

agents:
  agent_selector: true
  default: claude
  pi:
    command: pi
    flags: []
  claude:
    command: claude
    flags: ["--dangerously-skip-permissions"]
  codex:
    command: codex
    flags: ["--dangerously-bypass-approvals-and-sandbox"]

views:
  sessions:
    refresh_interval: 10s
    preview_enabled: true
    keybindings:
      A:
        cmd: SendAccept
      ctrl+d:
        cmd: TmuxKill
      p:
        cmd: TmuxPopUp
      S:
        cmd: TmuxStart
      M:
        cmd: WatchSession
      g:
        cmd: LazyGitOpen

todos:
  actions:
    obsidian: "open {{ .URI | shq }}"

plugins:
  shell_workers: 10 # shared subprocess concurrency limit
  github:
    enabled: true
    results_cache: 30m
  claude:
    yellow_threshold: 60 # % to turn yellow
    red_threshold: 80 # % to turn red
    model_limit: 200000 # context window size

rules:
  - pattern: ""
    branch_template: "hay-kot/{{ .Slug }}"
    max_recycled: 3
    commands:
      - hive ctx init
  - pattern: ".*[:/]grafana/.*"
    commands:
      - mise trust
  - pattern: ".*[:/]grafana/deployment_tools"
    clone_strategy: worktree
  - pattern: ".*[:/]grafana/loki"
    clone_strategy: worktree
  - pattern: ".*[:/]colonyops/.*"
    commands:
      - mise trust
  - pattern: ".*[:/]colonyops/conductor"
    commands:
      - bun install
      - bun run prepare
  - pattern: ".*[:/]hay-kot/.*"
    commands:
      - mise trust
  - pattern: ".*[:/]hay-kot/recipinned"
    commands:
      - mise run dep:sync
  - pattern: ".*[:/]hay-kot/mealie"
    commands:
      - task setup

usercommands:
  ReviewRequest:
    scope: ["sessions"]
    sh: "~/.config/hive/scripts/request-review.sh {{ .Name }}"
    help: "Request code review of current branch"
    silent: true

  CheckInbox:
    scope: ["sessions"]
    sh: '{{ agentSend }} "{{ .Name }}:{{ .TmuxWindow }}" "/hive-msg check you input for messages hive msg sub -t agent.{{ .ID }}.inbox --new"'
    help: "Instructs claude to check it's inbox"
    silent: true

  SendAccept:
    scope: ["sessions"]
    sh: '{{ agentSend }} "{{ .Name }}:{{ .TmuxWindow }}"'
    help: "Send enter to claude window"
    silent: true

  SendTidy:
    scope: ["sessions"]
    help: send /tidy
    sh: '{{ agentSend }} "{{ .Name }}:{{ .TmuxWindow }}" "/tidy"'
    silent: true

  SendClear:
    scope: ["sessions"]
    help: send /clear
    sh: '{{ agentSend }} "{{ .Name }}:{{ .TmuxWindow }}" "/clear"'
    silent: true

  SendRebase:
    scope: ["sessions"]
    help: send rebase command
    sh: '{{ agentSend }} "{{ .Name }}:{{ .TmuxWindow }}" "fetch and rebase the current branch on {{ if .Args }}{{ index .Args 0 }}{{ else }}main{{ end }} branch and resolve any conflicts"'
    silent: true

  OpenInZed:
    scope: ["sessions"]
    sh: "zed {{ .Path }}"
    help: open in zed
    silent: true

  PRLink:
    scope: ["sessions"]
    sh: "cd {{ .Path }} && prlink"
    help: get a pr link
    silent: false

  TmuxPopUp:
    scope: ["sessions"]
    help: popup
    sh: tmux display-popup -E -w 90% -h 90% "tmux kill-session -t hive-popup 2>/dev/null; tmux new-session -s hive-popup -t '{{ .Name }}' \; select-window -t :{{ .TmuxWindow }}"
    exit: false
    silent: true

  CopyAgentInbox:
    scope: ["sessions"]
    help: copy agent inbox to clipboard
    sh: cd {{ .Path }} && hive session info --json | jq .inbox -r | pbcopy
    silent: true

  WatchSession:
    scope: ["sessions"]
    help: add session to hivemind watchlist for monitoring
    form:
      - variable: directive
        type: text
        label: "What should this agent accomplish?"
        placeholder: "Implement JWT middleware. Open a PR targeting main when done."
    sh: cd {{ .Path }} && hive session info --json | uv run ~/Code/repos/hivemind/scripts/monitor.py add --directive {{ .Form.directive | shq }}
    silent: false

  ShareToBrain:
    scope: ["review"]
    help: "share focused doc to Adaptive Telemetry Brain"
    sh: |
      doc={{ .Doc.Path | shq }}
      dir=$(dirname "$doc")
      base=$(basename "$doc")
      target="docs/$(date -u +%Y%m%dT%H%M%SZ)-$base"

      cd "$dir"
      rice ingest "$target" --from "$base"
      echo "shared $doc to $target"
    silent: false
