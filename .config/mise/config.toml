[tools]
# -------------------------------------------------------
# Environments

go = "1.26.1"
node = "25.8.0"
bun = "1.3.10"
rust = "1.93.1"

# -------------------------------------------------------
# npm

"npm:prettier" = "3.8.1"
"npm:eslint" = "10.0.3"
"npm:typescript" = "5.9.3"
"npm:ts-node" = "10.9.2"
"npm:pnpm" = "10.31.0"
"npm:yarn" = "1.22.22"

# -------------------------------------------------------
# Go

# Go Team Tools
"go:golang.org/x/perf/cmd/benchstat" = "latest"
"go:golang.org/x/tools/cmd/deadcode" = "v0.42.0"

# Go Tools
"github:abice/go-enum" = "v0.9.2"
"github:Zxilly/go-size-analyzer" = "v1.11.0"
"github:homeport/dyff" = "v1.11.2"               # yaml differ 
"github:caarlos0/svu" = "v3.4.0"
"github:amir20/dtop" = "v0.5.0"             # docker tui

# Personal Go Tools
"go:github.com/hay-kot/mmdot" = "v0.4.1"
"go:github.com/hay-kot/mdparse" = "v0.1.0"
"github:hay-kot/gofind" = "v0.4.1"
"github:hay-kot/scaffold" = "v0.13.1"
"github:hay-kot/hive" = "v0.39.0"
"github:hay-kot/gobusgen" = "v0.2.0"
"github:zjrosen/perles" = "v0.7.83"

"forgejo:gitea/tea" = { version = "v0.11.1", api_url = "https://gitea.com/api/v1" }
# -------------------------------------------------------
# Rust

"github:sxyazi/yazi" = "v25.5.31"         # file explorer tui
"github:thomasschafer/scooter" = "v0.9.0" # find and replace mechanism
"cargo:sleek" = "0.5.0"                  # sql formatter

[settings]
idiomatic_version_file_enable_tools = ["python"]
experimental = true
lockfile = true

  [settings.npm]
  # use bun as the package manager for 'npm' register
  bun = true
